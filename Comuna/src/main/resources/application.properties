spring.application.name=Comuna

server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
# Correrá en el puerto 8082


# Apuntamos a la misma base de datos del restaurante en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/db_restaurante?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate actualizará la base de datos agregando la nueva tabla comuna
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Forzar la carga automática del import.sql de comunas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true