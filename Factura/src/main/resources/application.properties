# ===================================================================
# NUEVA CONFIGURACIÓN: CONEXIÓN A XAMPP (MYSQL LOCAL)
# ===================================================================

# 1. URL de conexión a tu phpMyAdmin (Cambia 'ms_facturacion' por el nombre de tu base de datos)
spring.datasource.url=jdbc:mysql://localhost:3306/ms_facturacion?serverTimezone=UTC&useSSL=false

# 2. Credenciales por defecto de XAMPP (Usuario root y sin contraseña)
spring.datasource.username=root
spring.datasource.password=root

# 3. Driver de conexión para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuración de Hibernate (JPA)
# 'update' creará automáticamente las tablas 'factura' y 'detalle_factura' en XAMPP
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de IntelliJ las consultas SQL que ocurren por detrás
spring.jpa.show-sql=true

# Traduce las operaciones de Java al lenguaje específico de MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false