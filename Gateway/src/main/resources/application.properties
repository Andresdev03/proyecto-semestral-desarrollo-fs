server.port=8080
spring.application.name=Gateway

# Eureka client settings
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway routing rules (explicit mappings using LoadBalancer lb://)

# Boleta Route
spring.cloud.gateway.routes[0].id=boleta-route
spring.cloud.gateway.routes[0].uri=lb://Boleta
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/boletas/**

# Comuna Route
spring.cloud.gateway.routes[1].id=comuna-route
spring.cloud.gateway.routes[1].uri=lb://Comuna
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/comunas/**

# Contrato Route
spring.cloud.gateway.routes[2].id=contrato-route
spring.cloud.gateway.routes[2].uri=lb://Contrato
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/contratos/**

# Empleado Route
spring.cloud.gateway.routes[3].id=empleado-route
spring.cloud.gateway.routes[3].uri=lb://Empleado
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/empleados/**

# Factura Route
spring.cloud.gateway.routes[4].id=factura-route
spring.cloud.gateway.routes[4].uri=lb://Factura
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/factura/**

# GuiaDespacho Route
spring.cloud.gateway.routes[5].id=guia-despacho-route
spring.cloud.gateway.routes[5].uri=lb://GuiaDespacho
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/guia_despacho/**

# Ingrediente Route
spring.cloud.gateway.routes[6].id=ingrediente-route
spring.cloud.gateway.routes[6].uri=lb://Ingrediente
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/ingrediente/**

# Pedido Route
spring.cloud.gateway.routes[7].id=pedido-route
spring.cloud.gateway.routes[7].uri=lb://Pedido
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/pedido/**

# Producto Route (regular endpoints)
spring.cloud.gateway.routes[8].id=producto-route
spring.cloud.gateway.routes[8].uri=lb://Producto
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/productos/**

# ProductoIngrediente Route
spring.cloud.gateway.routes[9].id=producto-ingrediente-route
spring.cloud.gateway.routes[9].uri=lb://Producto
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/producto-ingrediente/**

# Proveedor Route
spring.cloud.gateway.routes[10].id=proveedor-route
spring.cloud.gateway.routes[10].uri=lb://Proveedor
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/proveedor/**

# Region Route
spring.cloud.gateway.routes[11].id=region-route
spring.cloud.gateway.routes[11].uri=lb://Region
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/region/**

# Sucursal Route
spring.cloud.gateway.routes[12].id=sucursal-route
spring.cloud.gateway.routes[12].uri=lb://Sucursal
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/sucursal/**

# Turno Route
spring.cloud.gateway.routes[13].id=turno-route
spring.cloud.gateway.routes[13].uri=lb://Turno
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/v1/turnos/**

# CORS configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
